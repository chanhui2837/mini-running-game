<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>미니 달리기 게임</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            text-align: center; 
            background: linear-gradient(135deg, #111a2e 0%, #0a0f1d 100%); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow-x: hidden; -webkit-user-select: none; user-select: none;
        }
        .window-box { 
            background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); max-width: 700px; width: 90%; margin: 20px auto;
            position: relative;
        }
        h1 {
            font-size: 2.2rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(45deg, #ffae00, #ff4d4d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logout-btn {
            position: absolute; top: 15px; right: 15px; background: #d9534f; color: white;
            padding: 6px 12px; font-size: 12px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .logout-btn:hover { background: #c9302c; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .auth-tab-btn { flex: 1; padding: 10px; background: rgba(255,255,255,0.1); color: #ccc; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;}
        .auth-tab-btn.active { background: #ff7b00; color: white; }
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #bbb; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        .flex-row { display: flex; gap: 8px; }
        .custom-layout { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px; }
        .preview-area { flex: 1; background: #1a1a1a; min-height: 200px; border-radius: 10px; display: flex; justify-content: center; align-items: center; border: 2px solid #444; }
        .options-area { flex: 1.5; max-height: 280px; overflow-y: auto; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
        .category-title { font-size: 14px; color: #ffae00; font-weight: bold; margin: 10px 0 5px 0; border-bottom: 1px solid #444; padding-bottom: 3px; }
        .item-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .item-chip { padding: 6px 12px; font-size: 12px; background: rgba(255,255,255,0.1); border: 1px solid #555; border-radius: 20px; cursor: pointer; color: #ddd; }
        .item-chip:hover { background: rgba(255,255,255,0.2); }
        .item-chip.active { background: #00ffcc; color: #111; border-color: #00ffcc; font-weight: bold; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: all 0.2s ease; }
        .btn-primary { background: linear-gradient(45deg, #ffae00, #ff7b00); color: white; width: 100%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,123,0,0.3); }
        .mode-container { display: none; margin-top: 10px; }
        .mode-buttons-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .mode-btn { background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .mode-btn:hover { background: linear-gradient(90deg, #4d79ff, #335cd6); transform: translateX(5px); }
        #gameContainer { display: none; margin: 20px auto; width: 100%; max-width: 808px; }
        canvas { background: #1a1a1a; display: block; width: 100%; height: auto; border: 4px solid #fff; border-radius: 10px; }
        #mobileControls { display: none; justify-content: space-between; width: 100%; margin-top: 15px; }
        .touch-group { display: flex; gap: 15px; }
        .touch-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: white; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        
        .match-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
        .match-input { width: 60%; padding: 8px; border-radius: 4px; border: 1px solid #555; background: #222; color: #fff; text-align: center; font-weight: bold; }
        
        /* 추가된 서브 모드 스타일 */
        .sub-mode-container { display: none; margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px dashed rgba(255,255,255,0.2); }

        /* ============ 아이템 상점 & 인벤토리 스타일 (신규 추가) ============ */
        .shop-tabs { display: flex; gap: 8px; margin: 12px 0 14px 0; }
        .shop-tab-btn { flex: 1; padding: 9px; background: rgba(255,255,255,0.06); color: #aaa; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 13px; transition: all .2s ease; }
        .shop-tab-btn.active { background: linear-gradient(45deg, #00b386, #00ffcc); color: #063a2e; border-color: #00ffcc; box-shadow: 0 3px 10px rgba(0,255,204,0.25); }
        .item-shop-section { margin-top: 4px; }
        .item-shop-subtitle { font-size: 14px; color: #ffae00; font-weight: bold; margin: 14px 0 8px 0; display: flex; align-items: center; gap: 6px; }
        .equip-slot-bar { display: flex; gap: 10px; margin-bottom: 6px; }
        .equip-slot { flex: 1; max-width: 64px; height: 64px; background: rgba(0,0,0,0.35); border: 2px dashed rgba(255,255,255,0.25); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .equip-slot.filled { border-style: solid; border-color: #00ffcc; background: rgba(0,255,204,0.08); }
        .equip-slot svg { width: 70%; height: 70%; }
        .equip-slot-key { position: absolute; top: -8px; left: -8px; background: #ff7b00; color: #fff; font-size: 11px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #111a2e; z-index: 2; }
        .equip-slot-empty-label { font-size: 10px; color: #777; }
        .item-shop-grid, .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap: 10px; margin-bottom: 6px; }
        .item-card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; }
        .item-card.rarity-common { border-color: rgba(196,196,196,0.5); box-shadow: 0 0 12px rgba(196,196,196,0.12) inset; }
        .item-card.rarity-rare { border-color: rgba(77,121,255,0.6); box-shadow: 0 0 12px rgba(77,121,255,0.18) inset; }
        .item-card.rarity-mythic { border-color: rgba(184,51,255,0.6); box-shadow: 0 0 12px rgba(184,51,255,0.2) inset; }
        .item-card.rarity-legendary { border-color: rgba(255,174,0,0.7); box-shadow: 0 0 14px rgba(255,174,0,0.24) inset; }
        .item-card.coming-soon { opacity: 0.65; }
        .rarity-badge { position: absolute; top: 6px; left: 6px; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 20px; color: #111; z-index: 2; }
        .rarity-badge.common { background: #c4c4c4; }
        .rarity-badge.rare { background: #4d79ff; color: #fff; }
        .rarity-badge.mythic { background: #b833ff; color: #fff; }
        .rarity-badge.legendary { background: linear-gradient(45deg,#ffae00,#ff4d4d); color: #fff; }
        .item-card-icon-wrap { width: 62px; height: 62px; margin: 14px auto 8px auto; }
        .item-card-name { font-size: 12px; font-weight: bold; color: #eee; margin-bottom: 2px; }
        .item-card-desc { font-size: 10px; color: #999; min-height: 26px; margin-bottom: 6px; line-height: 1.3; }
        .item-card-price { font-size: 12px; color: #ffd700; font-weight: bold; margin-bottom: 6px; }
        .qty-stepper { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 6px; }
        .qty-btn { width: 22px; height: 22px; padding: 0; font-size: 13px; line-height: 1; background: rgba(255,255,255,0.12); color: #fff; border-radius: 5px; }
        .qty-input { width: 34px; text-align: center; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 12px; padding: 3px 0; }
        .buy-btn { width: 100%; padding: 7px; font-size: 12px; background: linear-gradient(45deg, #ffae00, #ff7b00); color: #fff; border-radius: 6px; }
        .coming-soon-tag { font-size: 10px; font-weight: bold; color: #ccc; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 6px; }
        .inventory-card .item-card-count { font-size: 11px; color: #00ffcc; margin-bottom: 6px; }
        .equip-toggle-btn { width: 100%; padding: 7px; font-size: 12px; border-radius: 6px; background: rgba(255,255,255,0.12); color: #fff; }
        .equip-toggle-btn.equipped { background: linear-gradient(45deg, #00b386, #00ffcc); color: #063a2e; }
        .empty-inventory-msg { font-size: 12px; color: #777; text-align: center; padding: 14px; grid-column: 1 / -1; }

        /* 게임 내 아이템 HUD (신규 추가) */
        #gameContainer { position: relative; }
        .item-hud { display: none; gap: 10px; justify-content: center; margin-bottom: 8px; }
        .item-hud-slot { width: 52px; height: 52px; background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; position: relative; display: flex; align-items: center; justify-content: center; }
        .item-hud-slot svg { width: 68%; height: 68%; }
        .item-hud-key { position: absolute; bottom: -6px; right: -6px; background: #ffae00; color: #111; font-size: 11px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #111a2e; }
        .item-hud-slot.active-effect { border-color: #00ffcc; box-shadow: 0 0 14px #00ffcc; }
        .item-hud-slot.used-up { opacity: 0.35; }
        .item-hud-count { position: absolute; top: -6px; left: -6px; background: #4d79ff; color: #fff; font-size: 10px; font-weight: bold; padding: 1px 5px; border-radius: 10px; border: 2px solid #111a2e; }
        canvas.shield-glow { box-shadow: 0 0 0 4px rgba(0, 255, 204, 0.2), 0 0 25px 8px rgba(0, 255, 204, 0.55) inset !important; border-color: #00ffcc !important; }
    </style>
</head>
<body>

    <div id="authWindow" class="window-box">
        <h1>🔐 RUNNER ACCOUNT</h1>
        <div class="auth-tabs">
            <button class="auth-tab-btn active" onclick="switchAuthTab('login')">로그인</button>
            <button class="auth-tab-btn" onclick="switchAuthTab('register')">회원가입</button>
        </div>
        <div id="loginForm">
            <div class="input-group">
                <label>닉네임</label>
                <input type="text" id="loginId" placeholder="닉네임을 입력하세요">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="loginPw" placeholder="비밀번호를 입력하세요">
            </div>
            <button class="btn-primary" onclick="handleLogin()">로그인하기</button>
        </div>
        <div id="registerForm" style="display:none;">
            <div class="input-group">
                <label>닉네임 (중복 불가)</label>
                <div class="flex-row">
                    <input type="text" id="regId" placeholder="사용할 닉네임">
                    <button style="background:#555; color:white; font-size:12px; padding:0 15px;" onclick="checkNicknameDup()">중복확인</button>
                </div>
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="regPw" placeholder="비밀번호 설정">
            </div>
            <div class="input-group">
                <label>이메일 주소</label>
                <input type="email" id="regEmail" placeholder="example@email.com">
            </div>
            <button class="btn-primary" style="background: #00b386;" onclick="handleRegister()">가입 완료</button>
        </div>
    </div>

    <div id="menuWindow" class="window-box" style="display:none;">
        <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
        <h1 id="welcomeText">🏃 로비 가이드 🏃</h1>
        <div style="color: #ffd700; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem;" id="coinText">💰 보유 코인: 0개</div>
        <div style="color: #00ffcc; font-weight: bold; margin-bottom: 10px;" id="highScoreText">🏆 일반 최고 기록: 0점</div>

        <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <span style="font-weight: bold; font-size: 15px; color: #00ffcc;">👗 CHARACTER CLOSET & SHOP</span>

            <!-- 신규 추가: 스킨 상점 / 아이템 상점 전환 탭 -->
            <div class="shop-tabs">
                <button type="button" class="shop-tab-btn active" id="tabBtnSkin" onclick="switchShopTab('skin')">👗 스킨 상점</button>
                <button type="button" class="shop-tab-btn" id="tabBtnItem" onclick="switchShopTab('item')">🎒 아이템 상점</button>
            </div>

            <div class="custom-layout" id="skinShopLayout">
                <div class="preview-area"><canvas id="previewCanvas" width="160" height="180"></canvas></div>
                <div class="options-area">
                    <div class="category-title">■ 캐릭터 피부 색상 변경</div>
                    <div class="item-grid" id="colorGrid"></div>
                    <div class="category-title">■ 모자 장착</div>
                    <div class="item-grid" id="hatGrid"></div>
                    <div class="category-title">■ 옷/상의 착용</div>
                    <div class="item-grid" id="clothGrid"></div>
                </div>
            </div>

            <!-- 신규 추가: 아이템 상점 + 인벤토리(장착) 영역 -->
            <div class="item-shop-section" id="itemShopLayout" style="display:none;">
                <div class="item-shop-subtitle">⚔️ 장착 슬롯 <span style="color:#999; font-weight:normal; font-size:11px;">(게임 중 1,2,3 키로 사용 가능)</span></div>
                <div class="equip-slot-bar" id="equipSlotBar"></div>

                <div class="item-shop-subtitle">🛒 아이템 상점</div>
                <div class="shop-tabs" id="rarityFilterTabs" style="margin-bottom:10px;"></div>
                <div class="item-shop-grid" id="itemShopGrid"></div>

                <div class="item-shop-subtitle">🎒 인벤토리 (클릭하여 장착/해제)</div>
                <div class="inventory-grid" id="inventoryGrid"></div>
            </div>
        </div>

        <button id="playBtn" class="btn-primary" style="margin-top:20px; font-size:20px;">GAME START</button>
        
        <div id="modeSelection" class="mode-container">
            <div class="mode-buttons-grid">
                <button class="mode-btn" onclick="startLocalInfiniteMode('normal')">🏃 무한 모드 (로컬 1P)</button>
                <button class="mode-btn" onclick="showChallengeSubModes()">🔥 도전 모드</button>
                
                <div id="challengeSubModes" class="sub-mode-container">
                    <button class="mode-btn" style="background: rgba(255, 77, 77, 0.1);" onclick="startLocalInfiniteMode('hard')">
                        <span>🔴 알파벳 타자 모드</span>
                        <span id="hardHighScoreText" style="color: #ff4d4d; font-size: 13px; font-weight: bold;">(최고: 0점)</span>
                    </button>
                </div>

                <button class="mode-btn" onclick="toggleOnlineArea()">🌐 온라인 멀티플레이 대결 메뉴 보기</button>
            </div>
            
            <div id="onlineRoomArea" style="display:none; margin-top:15px;" class="match-box">
                <div id="onlineStatus" style="color:#ffcc00; font-size:14px; font-weight:bold; margin-bottom:12px;">원하는 매칭 방식을 선택하세요.</div>
                
                <div style="margin-bottom: 15px; border-bottom: 1px dashed #555; padding-bottom: 15px;">
                    <input type="text" id="roomCodeInput" class="match-input" placeholder="매칭 코드 입력 (예: 1234)">
                    <button style="padding: 8px 15px; font-size: 13px; background: #4d79ff; color:white; margin-left:5px;" onclick="joinWithCode()">코드 방 입장</button>
                </div>

                <div>
                    <button id="randomMatchBtn" class="btn-primary" style="background: linear-gradient(45deg, #00b386, #00ffcc); color:#111;" onclick="startRandomMatch()">🎲 랜덤 매치 시작</button>
                </div>
                
                <button id="onlineStartBtn" class="btn-primary" style="margin-top:15px; display:none;" onclick="requestOnlineGameStart()">🎮 게임 시작하기</button>
            </div>
        </div>
    </div>

    <div id="gameContainer">
        <button style="background:#d9534f; color:white; font-size:14px; margin-bottom:10px;" onclick="exitToMenu()">🛑 메뉴로 탈출</button>
        <div id="itemHud" class="item-hud"></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="mobileControls">
            <div class="touch-group">
                <div class="touch-btn" id="btnS">감속</div>
                <div class="touch-btn" id="btnW">가속</div>
            </div>
            <div class="touch-group">
                <div class="touch-btn" id="btnShift">웅크리기</div>
                <div class="touch-btn" id="btnSpace" style="background:#ff7b00;">점프</div>
            </div>
        </div>
    </div>

<script>
const COLORS = [
    {name:'기본레드', value:'#ff4d4d', price:0}, {name:'네온블루', value:'#4d79ff', price:0}, {name:'라임그린', value:'#32cd32', price:0}, 
    {name:'선명옐로우', value:'#ffcc00', price:10}, {name:'핫핑크', value:'#ff69b4', price:15}, {name:'딥퍼풀', value:'#9370db', price:15},
    {name:'오렌지샤벳', value:'#ff7f50', price:20}, {name:'밀크화이트', value:'#ffffff', price:25}, {name:'샤크그레이', value:'#708090', price:30}, {name:'골드크라운', value:'#daa520', price:50}
];
const HATS = [
    {name:'없음', price:0}, {name:'야구모자', price:0}, {name:'신사중절모', price:10}, {name:'생일깔공모자', price:15}, 
    {name:'왕관', price:60}, {name:'천사링', price:50}, {name:'고양이귀', price:25}, {name:'카우보이', price:30}, 
    {name:'군대철모', price:35}, {name:'닌자두건', price:40}
];
const CLOTHES = [
    {name:'기본스킨', price:0}, {name:'티셔츠', price:0}, {name:'정장셔츠', price:15}, {name:'후드티', price:20}, 
    {name:'멜빵바지', price:30}, {name:'패딩점퍼', price:35}, {name:'드레스', price:45}, {name:'트레이닝복', price:25}, 
    {name:'히어로망토', price:70}, {name:'닌자도복', price:55}
];

let curColor = '#ff4d4d'; let curHat = '없음'; let curCloth = '기본스킨'; let curHighScore = 0; let curHardHighScore = 0;
let totalCoins = 0; let unlockedItems = { colors: ['#ff4d4d', '#4d79ff', '#32cd32'], hats: ['없음', '야구모자'], clothes: ['기본스킨', '티셔츠'] };
let isDupChecked = false; let loggedInUser = "Player";
let socket = null;
let matchTimeout = null;

// 어려운 모드용 변수 세팅
let infiniteType = "normal"; // "normal" 또는 "hard"
const ALPHABETS = "abcdefghijklmnopqrtuvwxyz".split(""); // w, s 제외

// 게임 내 코인 관리를 위한 변수
let gameCoins = [];

window.addEventListener('DOMContentLoaded', () => {
    socket = io(window.location.origin);

    let savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        // 서버 연결 후 유저 데이터 요청
        socket.emit('getUserData', { id: savedUser });
    }
    
    // 서버로부터 로그인/유저 데이터를 전달받았을 때 처리
    socket.on('userDataResponse', (res) => {
        if(res.success && res.user) {
            loadUserData(res.user);
        } else {
            localStorage.removeItem('currentUser');
        }
    });

    // 중복 체크 응답 처리
    socket.on('checkNicknameResponse', (res) => {
        if(res.success) {
            alert("✅ 사용 가능");
            isDupChecked = true;
        } else {
            alert("❌ 중복된 닉네임");
            isDupChecked = false;
        }
    });

    // 회원가입 응답 처리
    socket.on('registerResponse', (res) => {
        if(res.success) {

        } else {
            alert(res.message || "회원가입 실패");
        }
    });

    // 로그인 응답 처리
    socket.on('loginResponse', (res) => {

        } else {
            alert(data.message || "매칭에 실패했습니다.");
            resetMatchUI();
        }
    });

    socket.on('updatePosition', (moveData) => {
        if (moveData.type === 'GAME_OVER') {
            if (!gameOver) {
                gameOver = true;
                clearInterval(gameInterval);
                setTimeout(() => {
                    if (moveData.status === 'LOSER') {
                        alert(`🏆 상대방([${moveData.name}])이 장애물에 충돌했습니다! 내가 승리!`);
                    } else if (moveData.status === 'WINNER') {

                    }
                    exitToMenu();
                }, 50);
            }
            return;
        }

        if (!p2) p2 = new Player(2, moveData.name, moveData.color, 115, moveData.hat, moveData.cloth);
        p2.distance = moveData.distance;
        p2.jumpY = moveData.jumpY;
        p2.isCrouching = moveData.isCrouching;
        p2.color = moveData.color;
        p2.hat = moveData.hat;
        p2.cloth = moveData.cloth;
        p2.name = moveData.name;
    });
});

class Player {
    constructor(id, name, color, y, hat = '없음', cloth = '기본스킨') {
        this.id = id; this.name = name; this.color = color; this.x = 100; this.y = y;

        this.isJumping = false; this.jumpY = 0; this.jumpVelocity = 0; this.isCrouching = false; this.animTimer = 0;  
        this.hat = hat; this.cloth = cloth;
        this.collectedCoins = 0;
    }
    update() {
        this.speed += (this.targetSpeed - this.speed) * 0.1;
        if (this.speed < 0.5) this.speed = 0.5; if (this.speed > 12) this.speed = 12;

        if (this.isJumping) {
            this.jumpY += this.jumpVelocity; this.jumpVelocity += 0.6; 
            if (this.jumpY >= 0) { this.jumpY = 0; this.isJumping = false; }
        }
    }
    jump() { if (!this.isJumping && !this.isCrouching) { this.isJumping = true; this.jumpVelocity = -10; } }
    draw(ctx, renderY) {
        ctx.strokeStyle = this.color; ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.fillStyle = this.color;
        let cycle = Math.sin(this.animTimer); if (this.speed < 0.6 || this.isCrouching) cycle = 0; 
        let crouchOffset = this.isCrouching ? 15 : 0; let currentY = renderY + crouchOffset;
        
        ctx.beginPath(); ctx.arc(this.x, currentY - 35, 8, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.moveTo(this.x, currentY - 27);
        if (this.isCrouching) ctx.lineTo(this.x - 12, currentY - 10); else ctx.lineTo(this.x - 5, currentY - 5);
        ctx.stroke(); ctx.beginPath(); ctx.moveTo(this.x, currentY - 23);
        if (this.isCrouching) ctx.lineTo(this.x + 5, currentY - 5);
        else { ctx.lineTo(this.x + 10 + cycle * 5, currentY - 15); ctx.stroke(); ctx.beginPath(); ctx.moveTo(this.x, currentY - 23); ctx.lineTo(this.x - 10 - cycle * 5, currentY - 15); }
        ctx.stroke();
        if (this.isCrouching) { ctx.beginPath(); ctx.moveTo(this.x - 12, currentY - 10); ctx.lineTo(this.x - 5, renderY + 15); ctx.stroke(); } 
        else { ctx.beginPath(); ctx.moveTo(this.x - 5, currentY - 5); ctx.lineTo(this.x + cycle * 12, currentY + 15 - Math.abs(cycle) * 3); ctx.stroke(); ctx.beginPath(); ctx.moveTo(this.x - 5, currentY - 5); ctx.lineTo(this.x - cycle * 12, currentY + 15 - Math.abs(Math.cos(this.animTimer)) * 3); ctx.stroke(); }
        drawCharacterAssets(ctx, this.x, currentY, this.hat, this.cloth, this.color);
    }
}

// 대결 모드용 랜덤 맵 생성 장치 (매판 완전히 다른 맵으로 무작위화 생성)
function generateLocalObstacles() {
    obstacles = []; 
    gameCoins = [];
    let seed = Math.floor(Math.random() * 100000); // 실행 시마다 무작위 시드값 부여
    function pseudoRandom() { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }
    for (let d = 500; d < FINISH_LINE - 300; d += pseudoRandom() * 350 + 250) {
        let type = pseudoRandom() > 0.5 ? 'stone' : 'bird';
        if (type === 'stone') obstacles.push({ type: 'stone', distance: d, width: 20, height: 25 });
        else obstacles.push({ type: 'bird', distance: d, width: 25, height: 15, flyY: 35 });
        
        // 대결 모드에서도 사이사이에 코인 배치
        if(pseudoRandom() > 0.3) {
            let coinY = pseudoRandom() > 0.5 ? 165 : 120; // 땅 또는 공중 높이
            gameCoins.push({ distance: d - 100, y: coinY, radius: 6, active: true });
        }
    }
}

// 무한 모드 전용 실시간 무한 공급 장치 (Math.random() 사용으로 자동 완전 무작위화)
function manageInfiniteObstacles() {
    while (lastObstacleDistance < p1.distance + 1000) {
        let gap = Math.random() * 350 + 250;
        let prevDistance = lastObstacleDistance;
        lastObstacleDistance += gap;
        
        let dice = Math.random();
        if (infiniteType === "hard" && dice < 0.25) {
            // 어려운 무한 모드일 때 25% 확률로 알파벳 네모 블록 무작위 배치
            let randChar = ALPHABETS[Math.floor(Math.random() * ALPHABETS.length)];
            obstacles.push({ type: 'letterBlock', distance: lastObstacleDistance, width: 25, height: 25, letter: randChar });
        } else if (Math.random() > 0.5) {
            obstacles.push({ type: 'stone', distance: lastObstacleDistance, width: 20, height: 25 });
        } else {
            obstacles.push({ type: 'bird', distance: lastObstacleDistance, width: 25, height: 15, flyY: 35 });
        }

        // 장애물 사이에 코인 스폰 확률 부여 (연속 코인 또는 단일 코인 배치)
        if(Math.random() > 0.3) {
            let coinPattern = Math.random() > 0.5 ? 'high' : 'low';
            let spawnY = coinPattern === 'high' ? 120 : 165;
            let coinDist = prevDistance + (gap / 2);
            gameCoins.push({ distance: coinDist, y: spawnY, radius: 6, active: true });
            if(Math.random() > 0.5) {
                gameCoins.push({ distance: coinDist + 40, y: spawnY, radius: 6, active: true });
                gameCoins.push({ distance: coinDist + 80, y: spawnY, radius: 6, active: true });
            }
        }
    }
    obstacles = obstacles.filter(obs => obs.distance > p1.distance - 200);
    gameCoins = gameCoins.filter(coin => coin.distance > p1.distance - 200);
}

function startLocalInfiniteMode(type = 'normal') {
    infiniteType = type; // 'normal' 혹은 'hard' 저장
    gameMode = "infinite"; menuWindow.style.display = 'none'; gameContainer.style.display = 'block'; gameOver = false;
    if(isMobile) mobileControls.style.display = 'flex';
    p1 = new Player(1, loggedInUser, curColor, 165, curHat, curCloth); p2 = null;
    setupItemHudForGame(); // 신규 추가: 장착한 아이템 HUD 표시
    obstacles = []; gameCoins = []; lastObstacleDistance = 400; 
    keys = {}; gameInterval = setInterval(gameLoop, 1000 / 60);
}

window.addEventListener('keydown', (e) => { 
    let keyName = e.key; 
    if (e.keyCode === 16) keyName = 'Shift'; 
    keys[keyName] = true; 
    if (keyName === ' ' && p1) p1.jump(); 

    // 어려운 무한모드 알파벳 파괴 로직 처리
    if (gameMode === "infinite" && infiniteType === "hard" && p1) {
        let lowerKey = keyName.toLowerCase();
        // 화면 안 범위(캐릭터 위치 근방 포함 다가오는 블록)에 입력한 알파벳과 일치하는 블록 탐색 후 제거
        obstacles = obstacles.filter(obs => {
            if (obs.type === 'letterBlock' && obs.letter === lowerKey && Math.abs(p1.distance - obs.distance) < 500) {
                return false; // 필터에서 제외(=제거)
            }
            return true;
        });
    }
});
window.addEventListener('keyup', (e) => { let keyName = e.key; if (e.keyCode === 16) keyName = 'Shift'; keys[keyName] = false; });

if(isMobile){
    const btnW = document.getElementById('btnW'); const btnS = document.getElementById('btnS');
    const btnShift = document.getElementById('btnShift'); const btnSpace = document.getElementById('btnSpace');
    btnW.addEventListener('touchstart', (e) => { e.preventDefault(); keys['w'] = true; }); btnW.addEventListener('touchend', () => { keys['w'] = false; });
    btnS.addEventListener('touchstart', (e) => { e.preventDefault(); keys['s'] = true; }); btnS.addEventListener('touchend', () => { keys['s'] = false; });
    btnShift.addEventListener('touchstart', (e) => { e.preventDefault(); keys['Shift'] = true; }); btnShift.addEventListener('touchend', () => { keys['Shift'] = false; });
    btnSpace.addEventListener('touchstart', (e) => { e.preventDefault(); if(p1) p1.jump(); });
}

function handleInput() { if (p1) { if (keys['w'] || keys['W']) p1.targetSpeed += 0.2; if (keys['s'] || keys['S']) p1.targetSpeed -= 0.2; p1.isCrouching = !!keys['Shift']; } }

function gameLoop() {
    if (gameOver) return; 
    handleInput(); 
    p1.update(); 
    
    if (gameMode === "infinite") {
        manageInfiniteObstacles();
    }
    
    if (gameMode === "onlineRacing" && p2) {
        p2.animTimer += p2.speed * 0.15; 
        if (p2.speed < 0.6 || p2.isCrouching) p2.animTimer = 0;
    }
    
    if (gameMode === "onlineRacing" && socket) {
        socket.emit('playerMove', { name: loggedInUser, distance: p1.distance, jumpY: p1.jumpY, isCrouching: p1.isCrouching, color: curColor, hat: curHat, cloth: curCloth });
    }
    checkCollisionsAndRules(); 
    draw();
}

function checkCollisionsAndRules() {
    if (gameOver) return;

    // 코인 수집 판정 처리 (플레이어의 X축 스크롤 위치와 높이 판정)
    gameCoins.forEach(coin => {
        if (coin.active && Math.abs(p1.distance - coin.distance) < 25) {
            let playerCurrentY = (gameMode === "infinite" ? 165 : 115) + p1.jumpY;
            if (p1.isCrouching) playerCurrentY += 15;
            
            // Y축 범위 충돌 체크 (머리부터 발끝 범위)
            if (coin.y >= playerCurrentY - 45 && coin.y <= playerCurrentY + 15) {
                coin.active = false;
                p1.collectedCoins++;
                totalCoins++; // 글로벌 코인 누적 증가
            }
        }
    });

    if (gameMode === "infinite") {
        obstacles.forEach(obs => { 
            if (Math.abs(p1.distance - obs.distance) < 22) { 
                // 일반 장애물 충돌 조건 또는 알파벳 블록 충돌 조건 체크 (웅크리거나 뛰어넘지 못하면 오버)
                if (!p1.shieldActive && ((obs.type === 'stone' && p1.jumpY > -20) || (obs.type === 'bird' && !p1.isCrouching) || (obs.type === 'letterBlock' && p1.jumpY > -20))) { 
                    if (infiniteType === "hard") {
                        if (p1.distance > curHardHighScore) { curHardHighScore = p1.distance; }
                    } else {
                        if (p1.distance > curHighScore) { curHighScore = p1.distance; } 
                    }
                    saveUserData();
                    endLocalGame(`☠️ 게임 오버!\n점수: ${Math.round(p1.distance)}점\n획득한 코인: ${p1.collectedCoins}개`); 
                } 
            } 
        });
    } 
    else if (gameMode === "onlineRacing") {
        obstacles.forEach(obs => { 
            if (Math.abs(p1.distance - obs.distance) < 22) { 
                if (!p1.shieldActive && ((obs.type === 'stone' && p1.jumpY > -20) || (obs.type === 'bird' && !p1.isCrouching))) {
                    if (!gameOver) {
                        gameOver = true; clearInterval(gameInterval);
                        saveUserData();
                        if(socket) socket.emit('playerMove', { type: 'GAME_OVER', status: 'LOSER', name: loggedInUser });
                        setTimeout(() => { alert(`☠️ 장애물에 충돌했습니다! 내가 패배했습니다.\n획득한 코인: ${p1.collectedCoins}개`); exitToMenu(); }, 50);
                    }
                } 
            } 
        });
        if (p1.distance >= FINISH_LINE) { 
            if (!gameOver) {
                gameOver = true; clearInterval(gameInterval);
                saveUserData();
                if(socket) socket.emit('playerMove', { type: 'GAME_OVER', status: 'WINNER', name: loggedInUser });
                setTimeout(() => { alert(`🏆 축하합니다! 결승선을 통과하여 내가 승리했습니다!\n획득한 코인: ${p1.collectedCoins}개`); exitToMenu(); }, 50);
            }
        }
    }
}

function endLocalGame(msg) { gameOver = true; clearInterval(gameInterval); setTimeout(() => { alert(msg); exitToMenu(); }, 10); }

function exitToMenu() { 
    gameOver = true; clearInterval(gameInterval);
    if(socket) socket.emit('cancelMatch');
    gameContainer.style.display = 'none'; mobileControls.style.display = 'none'; menuWindow.style.display = 'block'; playBtn.style.display = 'inline-block'; modeSelection.style.display = 'none'; onlineRoomArea.style.display = 'none'; 
    document.getElementById('challengeSubModes').style.display = 'none'; // 서브 메뉴 리셋
    document.getElementById('coinText').innerText = `💰 보유 코인: ${totalCoins}개`;
    document.getElementById('highScoreText').innerText = `🏆 일반 최고 기록: ${Math.round(curHighScore)}점`;
    document.getElementById('hardHighScoreText').innerText = `(최고: ${Math.round(curHardHighScore)}점)`;
    buildCustomUI();
    resetMatchUI();
    hideItemHud(); renderInventory(); renderEquipSlots(); // 신규 추가: 아이템 HUD/인벤토리 갱신
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameMode === "infinite") {
        let camX = p1.distance - 100; ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(800, 200); ctx.stroke();
        
        // 코인 그리기 영역
        gameCoins.forEach(coin => {
            if(coin.active) {
                let coinX = coin.distance - camX;
                if(coinX > -50 && coinX < 850) {
                    ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#ff8c00'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(coinX, coin.y, coin.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    // 코인 내부 반짝임 표현
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(coinX - 2, coin.y - 2, 1.5, 0, Math.PI * 2); ctx.fill();
                }
            }
        });

        obstacles.forEach(obs => { 
            let obsX = obs.distance - camX; 
            if (obsX > -50 && obsX < 850) { 
                if (obs.type === 'stone') { 
                    ctx.fillStyle = '#888'; ctx.fillRect(obsX, 200 - obs.height, obs.width, obs.height); 
                } else if (obs.type === 'bird') { 
                    ctx.fillStyle = '#ff4500'; ctx.fillRect(obsX, 200 - obs.flyY, obs.width, obs.height); 
                } else if (obs.type === 'letterBlock') {
                    // 알파벳 네모 블록 드로잉 스타일 적용
                    ctx.fillStyle = '#00ffcc';
                    ctx.fillRect(obsX, 200 - obs.height, obs.width, obs.height);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(obsX, 200 - obs.height, obs.width, obs.height);
                    
                    ctx.fillStyle = '#111';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(obs.letter.toUpperCase(), obsX + obs.width/2, 200 - obs.height/2);
                }
            } 
        });
        p1.draw(ctx, 165 + p1.jumpY);
        
        ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
        let modeLabel = infiniteType === "hard" ? " [알파벳 타자 모드]" : " [일반 무한 모드]";
        ctx.fillText(`🏆 현재 점수(거리): ${Math.round(p1.distance)}${modeLabel}`, 20, 30);
        ctx.fillStyle = '#ffd700'; ctx.fillText(`💰 획득 코인: ${p1.collectedCoins}개`, 20, 55);
    } 
    else if (gameMode === "onlineRacing") {
        let track1Data = p1; let track2Data = p2; if(!track1Data || !track2Data) return;
        let camX1 = track1Data.distance - 100;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, 130); ctx.lineTo(800, 130); ctx.stroke(); 
        if (FINISH_LINE - camX1 > -50 && FINISH_LINE - camX1 < 850) { ctx.fillStyle = '#ffcc00'; ctx.fillRect(FINISH_LINE - camX1, 30, 20, 100); }
        
        // 상단 트랙 코인 그리기
        gameCoins.forEach(coin => {
            if(coin.active) {
                let coinX = coin.distance - camX1;
                if(coinX > -50 && coinX < 850) {
                    ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#ff8c00'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(coinX, coin.y, coin.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                }
            }
        });
        
        obstacles.forEach(obs => { let obsX = obs.distance - camX1; if (obsX > -50 && obsX < 850) { if (obs.type === 'stone') { ctx.fillStyle = '#888'; ctx.fillRect(obsX, 130 - obs.height, obs.width, obs.height); } else { ctx.fillStyle = '#ff4500'; ctx.fillRect(obsX, 130 - obs.flyY, obs.width, obs.height); } } });

        let camX2 = track2Data.distance - 100;
        ctx.strokeStyle = '#ffae00'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(800, 200); ctx.stroke(); 
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, 330); ctx.lineTo(800, 330); ctx.stroke(); 
        if (FINISH_LINE - camX2 > -50 && FINISH_LINE - camX2 < 850) { ctx.fillStyle = '#ffcc00'; ctx.fillRect(FINISH_LINE - camX2, 230, 20, 100); }
        
        // 하단 트랙 코인 그리기 (상대방 트랙 시점 연동)
        gameCoins.forEach(coin => {
            if(coin.active) {
                let coinX = coin.distance - camX2;
                if(coinX > -50 && coinX < 850) {
                    ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#ff8c00'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(coinX, coin.y + 200, coin.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                }
            }
        });

        obstacles.forEach(obs => { let obsX = obs.distance - camX2; if (obsX > -50 && obsX < 850) { if (obs.type === 'stone') { ctx.fillStyle = '#888'; ctx.fillRect(obsX, 330 - obs.height, obs.width, obs.height); } else { ctx.fillStyle = '#ff4500'; ctx.fillRect(obsX, 330 - obs.flyY, obs.width, obs.height); } } });

        track1Data.draw(ctx, 115 + track1Data.jumpY); track2Data.draw(ctx, 115 + track2Data.jumpY + 200);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
        ctx.fillText(`🏃 [유저: ${track1Data.name}] 거리: ${Math.round(track1Data.distance)} / ${FINISH_LINE} | 💰 코인: ${track1Data.collectedCoins}`, 20, 25);
        ctx.fillText(`🏃 [유저: ${track2Data.name}] 거리: ${Math.round(track2Data.distance)} / ${FINISH_LINE}`, 20, 225);
    }
}

/* ============================================================
   🎒 아이템 상점 & 인벤토리 시스템 (신규 추가 기능)
   ------------------------------------------------------------
   ※ 기존 로직은 수정하지 않았습니다. 방패 아이템의 "무적" 효과를
     실제로 동작시키기 위해 checkCollisionsAndRules()의 충돌 조건
     두 곳에만 "!p1.shieldActive" 조건을 추가했고, 그 외에는 아래
     새 코드에서 필요한 부분만 최소한으로 호출을 연결했습니다.
   ============================================================ */

// 아이템 등급 정보 (일반 / 레어 / 신화 / 전설)

};

// type이 같은 아이템은 동시에 1개만 장착 가능 (서로 다른 type이면 최대 3개까지 장착)

    {
        id: 'guardian_shield', type: 'shield', rarity: 'common', name: '가디언 방패',
        desc: '사용 시 10초간 모든 장애물에 무적이 됩니다.', price: 15,
        available: true, effect: 'shield', effectValue: 10000
    }
    // ※ 레어/신화/전설 아이템은 추후 등급별로 다수 추가될 예정입니다.
    //    새 아이템은 이 배열에 객체만 추가하면 상점/인벤토리/등급 필터에 자동 반영됩니다.
];

let itemInventory = {};    // 보유 아이템 수량: { itemId: count }
let equippedItems = [];    // 장착된 아이템 id 배열 (배열 순서 = 게임 내 1,2,3 키)
let gameHudItems = [];     // 게임 시작 시점에 고정된 장착 아이템 스냅샷
let shieldTimeoutHandle = null;

// 계정별 아이템 데이터는 서버 스키마를 건드리지 않기 위해 localStorage에 별도 저장합니다.
function getItemStorageKey() { return `itemData_${loggedInUser}`; }

function loadItemData() {
    itemInventory = {}; equippedItems = [];
    try {
        let raw = localStorage.getItem(getItemStorageKey());
        if (raw) {
            let parsed = JSON.parse(raw);
            itemInventory = parsed.itemInventory || {};
            equippedItems = parsed.equippedItems || [];
        }
    } catch(e) { itemInventory = {}; equippedItems = []; }
    renderRarityTabs(); renderItemShop(); renderInventory(); renderEquipSlots();
}

function saveItemData() {
    try { localStorage.setItem(getItemStorageKey(), JSON.stringify({ itemInventory, equippedItems })); } catch(e) {}
}

function switchShopTab(tab) {
    document.getElementById('skinShopLayout').style.display = tab === 'skin' ? 'flex' : 'none';
    document.getElementById('itemShopLayout').style.display = tab === 'item' ? 'block' : 'none';
    document.getElementById('tabBtnSkin').classList.toggle('active', tab === 'skin');
    document.getElementById('tabBtnItem').classList.toggle('active', tab === 'item');
    if (tab === 'item') { renderRarityTabs(); renderItemShop(); renderInventory(); renderEquipSlots(); }
}

            </defs>
            <path d="M50 4 L88 18 V48 C88 74 71 90 50 97 C29 90 12 74 12 48 V18 Z" fill="url(#shieldBody_${item.id})" stroke="#5b6169" stroke-width="3"/>
            <path d="M50 12 L80 24 V47 C80 68 67 81 50 87 C33 81 20 68 20 47 V24 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.55"/>
            <circle cx="50" cy="46" r="15" fill="url(#shieldGem_${item.id})" stroke="#ffffff" stroke-width="1.5"/>
            <path d="M50 36 L54 44 L63 45.5 L56.5 51.5 L58 60.5 L50 56 L42 60.5 L43.5 51.5 L37 45.5 L46 44 Z" fill="#ffffff" opacity="0.9"/>
        </svg>`;
    }
    // 아직 전용 아이콘이 그려지지 않은 아이템을 위한 기본(등급색) 보석 아이콘
    // 추후 레어/신화/전설 아이템을 추가할 때 이 위에 전용 디자인을 얹으면 됩니다.
    let rarityColor = ITEM_RARITY[item.rarity].color;
    return `
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <radialGradient id="gemGlow_${item.id}" cx="50%" cy="40%" r="65%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="45%" stop-color="${rarityColor}"/>
                <stop offset="100%" stop-color="${rarityColor}" stop-opacity="0.55"/>
            </radialGradient>
        </defs>
        <circle cx="50" cy="50" r="38" fill="${rarityColor}" opacity="0.15"/>
        <path d="M50 10 L82 38 L68 88 H32 L18 38 Z" fill="url(#gemGlow_${item.id})" stroke="${rarityColor}" stroke-width="3"/>
        <path d="M50 10 L32 38 H68 Z" fill="#ffffff" opacity="0.35"/>
    </svg>`;
}

/* ---------- 아이템 상점 렌더링 ---------- */
let currentRarityFilter = 'all';

function renderRarityTabs() {
    const tabBar = document.getElementById('rarityFilterTabs');
    if (!tabBar) return;
    const filters = [
        { key: 'all', label: '전체' },
        { key: 'common', label: ITEM_RARITY.common.label },
        { key: 'rare', label: ITEM_RARITY.rare.label },
        { key: 'mythic', label: ITEM_RARITY.mythic.label },
        { key: 'legendary', label: ITEM_RARITY.legendary.label }
    ];
    tabBar.innerHTML = '';
    filters.forEach(f => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'shop-tab-btn' + (currentRarityFilter === f.key ? ' active' : '');
        btn.innerText = f.label;
        btn.onclick = () => { currentRarityFilter = f.key; renderRarityTabs(); renderItemShop(); };
        tabBar.appendChild(btn);
    });
}

function renderItemShop() {
    const grid = document.getElementById('itemShopGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const filtered = SHOP_ITEMS.filter(item => currentRarityFilter === 'all' || item.rarity === currentRarityFilter);
    if (filtered.length === 0) {
        const rarityLabel = currentRarityFilter === 'all' ? '' : ITEM_RARITY[currentRarityFilter].label + ' ';
        grid.innerHTML = `<div class="empty-inventory-msg">${rarityLabel}아이템은 추후 업데이트로 추가될 예정입니다. 🛠️</div>`;
        return;
    }
    filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = `item-card rarity-${item.rarity}` + (item.available ? '' : ' coming-soon');
        let inner = `<div class="rarity-badge ${item.rarity}">${ITEM_RARITY[item.rarity].label}</div>`;
        inner += `<div class="item-card-icon-wrap">${itemIconSVG(item)}</div>`;
        inner += `<div class="item-card-name">${item.name}</div>`;
        inner += `<div class="item-card-desc">${item.desc}</div>`;
        if (item.available) {
            inner += `<div class="item-card-price">💰 ${item.price} / 개</div>`;
            inner += `<div class="qty-stepper">
                <button type="button" class="qty-btn" onclick="stepQty('${item.id}', -1)">−</button>
                <input class="qty-input" type="number" min="1" max="99" value="1" id="qty_${item.id}">
                <button type="button" class="qty-btn" onclick="stepQty('${item.id}', 1)">＋</button>
            </div>`;
            inner += `<button type="button" class="buy-btn" onclick="buyItem('${item.id}')">구매하기</button>`;
        } else {
            inner += `<div class="coming-soon-tag">🔒 출시 예정</div>`;
        }
        card.innerHTML = inner;
        grid.appendChild(card);
    });
}

function stepQty(itemId, delta) {
    const input = document.getElementById(`qty_${itemId}`);
    if (!input) return;
    let val = parseInt(input.value) || 1;
    val = Math.min(99, Math.max(1, val + delta));
    input.value = val;
}

function buyItem(itemId) {
    const item = SHOP_ITEMS.find(i => i.id === itemId);
    if (!item || !item.available) return;
    const input = document.getElementById(`qty_${itemId}`);
    let qty = Math.min(99, Math.max(1, parseInt(input ? input.value : 1) || 1));
    const totalPrice = item.price * qty;
    if (totalCoins < totalPrice) { alert('❌ 코인이 부족합니다! 게임을 플레이하여 코인을 모아보세요.'); return; }
    if (!confirm(`[${item.name}] x${qty}개를 ${totalPrice}코인에 구매하시겠습니까?`)) return;
    totalCoins -= totalPrice;
    itemInventory[itemId] = (itemInventory[itemId] || 0) + qty;
    document.getElementById('coinText').innerText = `💰 보유 코인: ${totalCoins}개`;
    saveItemData();
    renderInventory();
}

/* ---------- 인벤토리 렌더링 (장착 / 해제) ---------- */
function renderInventory() {
    const grid = document.getElementById('inventoryGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const ownedItems = SHOP_ITEMS.filter(i => (itemInventory[i.id] || 0) > 0);
    if (ownedItems.length === 0) {
        grid.innerHTML = '<div class="empty-inventory-msg">보유한 아이템이 없습니다. 상점에서 아이템을 구매해보세요!</div>';
        return;
    }
    ownedItems.forEach(item => {
        const isEquipped = equippedItems.includes(item.id);
        const card = document.createElement('div');
        card.className = `item-card inventory-card rarity-${item.rarity}`;
        let inner = `<div class="rarity-badge ${item.rarity}">${ITEM_RARITY[item.rarity].label}</div>`;
        inner += `<div class="item-card-icon-wrap">${itemIconSVG(item)}</div>`;
        inner += `<div class="item-card-name">${item.name}</div>`;
        inner += `<div class="item-card-count">보유: ${itemInventory[item.id]}개</div>`;
        inner += `<button type="button" class="equip-toggle-btn ${isEquipped ? 'equipped' : ''}" onclick="toggleEquip('${item.id}')">${isEquipped ? '✅ 장착 중 (해제)' : '장착하기'}</button>`;
        card.innerHTML = inner;
        grid.appendChild(card);
    });
}

function toggleEquip(itemId) {
    const item = SHOP_ITEMS.find(i => i.id === itemId);
    if (!item) return;
    if (equippedItems.includes(itemId)) {
        equippedItems = equippedItems.filter(id => id !== itemId);
    } else {
        if (equippedItems.length >= 3) { alert('❌ 장착 슬롯은 최대 3개입니다. 다른 아이템을 먼저 해제해주세요.'); return; }
        const sameTypeId = equippedItems.find(id => {
            const eq = SHOP_ITEMS.find(x => x.id === id);
            return eq && eq.type === item.type;
        });
        if (sameTypeId) { alert('❌ 같은 종류의 아이템은 1개만 장착할 수 있습니다. 먼저 해제해주세요.'); return; }
        equippedItems.push(itemId);
    }
    saveItemData();
    renderInventory(); renderEquipSlots();
}

function renderEquipSlots() {
    const bar = document.getElementById('equipSlotBar');
    if (!bar) return;
    bar.innerHTML = '';
    for (let i = 0; i < 3; i++) {
        const slot = document.createElement('div');
        const itemId = equippedItems[i];
        const item = itemId ? SHOP_ITEMS.find(x => x.id === itemId) : null;
        slot.className = 'equip-slot' + (item ? ' filled' : '');
        if (item) {
            slot.innerHTML = `<span class="equip-slot-key">${i+1}</span>${itemIconSVG(item)}`;
            slot.title = `${item.name} (클릭 시 해제)`;
            slot.onclick = (function(id){ return function(){ toggleEquip(id); }; })(item.id);
        } else {
            slot.innerHTML = `<span class="equip-slot-empty-label">빈 슬롯</span>`;
        }
        bar.appendChild(slot);
    }
}

/* ---------- 게임 내 아이템 HUD 및 사용 로직 ---------- */
function setupItemHudForGame() {
    gameHudItems = equippedItems.slice(0, 3);
    renderItemHudDom();
    const hud = document.getElementById('itemHud');
    if (hud) hud.style.display = gameHudItems.length > 0 ? 'flex' : 'none';
    if (p1) p1.shieldActive = false;
    if (canvas) canvas.classList.remove('shield-glow');
    if (shieldTimeoutHandle) { clearTimeout(shieldTimeoutHandle); shieldTimeoutHandle = null; }
}

function renderItemHudDom() {
    const hud = document.getElementById('itemHud');
    if (!hud) return;
    hud.innerHTML = '';
    gameHudItems.forEach((itemId, idx) => {
        const item = SHOP_ITEMS.find(x => x.id === itemId);
        if (!item) return;
        const count = itemInventory[itemId] || 0;
        const slot = document.createElement('div');
        slot.className = 'item-hud-slot';
        slot.id = `hudSlot_${idx}`;
        slot.innerHTML = `<span class="item-hud-count">${count}</span>${itemIconSVG(item)}<span class="item-hud-key">${idx+1}</span>`;
        if (count <= 0) slot.classList.add('used-up');
        hud.appendChild(slot);
    });
}

function useItemSlot(slotIndex) {
    if (!p1 || gameOver) return;
    const itemId = gameHudItems[slotIndex];
    if (!itemId) return;
    const item = SHOP_ITEMS.find(x => x.id === itemId);
    if (!item || !item.available) return;
    if ((itemInventory[itemId] || 0) <= 0) return;

    if (item.effect === 'shield') {
        if (p1.shieldActive) return; // 이미 무적 상태면 중복 사용 방지
        itemInventory[itemId]--;
        saveItemData();
        renderItemHudDom();
        p1.shieldActive = true;
        if (canvas) canvas.classList.add('shield-glow');
        const slotDom = document.getElementById(`hudSlot_${slotIndex}`);
        if (slotDom) slotDom.classList.add('active-effect');
        if (shieldTimeoutHandle) clearTimeout(shieldTimeoutHandle);
        shieldTimeoutHandle = setTimeout(() => {
            if (p1) p1.shieldActive = false;
            if (canvas) canvas.classList.remove('shield-glow');
            if (slotDom) slotDom.classList.remove('active-effect');
            shieldTimeoutHandle = null;
        }, item.effectValue);
    }
}

function hideItemHud() {
    const hud = document.getElementById('itemHud');
    if (hud) { hud.style.display = 'none'; hud.innerHTML = ''; }
    if (shieldTimeoutHandle) { clearTimeout(shieldTimeoutHandle); shieldTimeoutHandle = null; }
    if (canvas) canvas.classList.remove('shield-glow');
    gameHudItems = [];
}

// 게임 화면이 보이는 동안에만 1,2,3 키로 아이템을 사용합니다 (기존 keydown 리스너와는 별개로 동작).
window.addEventListener('keydown', (e) => {
    if (gameContainer && gameContainer.style.display === 'block') {
        if (e.key === '1') useItemSlot(0);
        else if (e.key === '2') useItemSlot(1);
        else if (e.key === '3') useItemSlot(2);
    }
});
</script>
